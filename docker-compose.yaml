version: "3.9"

services:
  db:
    image: postgres
    container_name: reiklander-postgres
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: reiklanderdb
    volumes:
      - pgdata:/var/lib/postgres/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    ports:
      - "8080:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    volumes:
      - ./pgadmin-servers.json:/pgadmin4/servers.json
    depends_on:
      - db

volumes:
  pgdata:
